ai_usage_summary: |
  Used Claude for architectural discussion, scoring ideology (weight design,
  honeypot heuristics, disqualifier logic), and iterative code review across
  multiple versions of rank.py. Claude was used as a reasoning partner —
  no candidate data was fed to any LLM at any point.
  Used GitHub Copilot for file structure and boilerplate autocomplete.
  All scoring logic, weight decisions, and design choices are original team work.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Rule-based ranker with five weighted sub-scores and explicit per-candidate
  reasoning capture. Positive sub-scores: role_fit (0.30) — evaluates YOE band
  fit, applied-ML-at-product-company tenure fraction, and current title match;
  skill_fit (0.25) — matches candidate skills against a JD-derived required and
  nice-to-have skill lexicon weighted by proficiency level, with a career
  corroboration discount that penalises keyword-stuffed profiles whose role
  history shows no ML/AI-adjacent titles; semantic_fit (0.15) — TF-IDF cosine
  similarity between a candidate document (headline, summary, recent roles,
  skills) and the JD text, min-max normalised across the candidate pool;
  availability (0.10) — composite of recency, open-to-work flag, recruiter
  response rate, notice period, location fit, and interview completion rate.
  Positive weights sum to 0.80 deliberately, leaving 0.20 headroom for penalty
  deductions. Deductions: a disqualifier penalty (up to 0.35 scaled) fires on
  consulting-only careers, pure-research profiles, CV/robotics-only skill sets
  with no NLP/IR overlap, and recent-AI-buzzword-only histories; a fixed 0.90
  honeypot penalty fires when two or more structural anomaly flags are detected
  (e.g. expert skills with near-zero duration, implausibly uniform assessment
  scores, fully-complete profile active same day as signup). Final score is
  floored at 0. Runtime is well under 5 minutes for 100k candidates on CPU.

